services:
  assistant:
    image: ghcr.io/gustavocaiano/oscar:${OSCAR_IMAGE_TAG:-latest}
    build:
      context: .
    restart: unless-stopped
    mem_limit: ${ASSISTANT_MEMORY_LIMIT:-3584m}
    memswap_limit: ${ASSISTANT_MEMORY_SWAP_LIMIT:-3584m}
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ALLOWED_CHAT_IDS: ${ALLOWED_CHAT_IDS:-}
      DATABASE_PATH: ${DATABASE_PATH:-/data/assistant.sqlite3}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://cliproxyapi:8317/api/provider/openai/v1}
      BACKEND_API_KEY: ${BACKEND_API_KEY:-}
      BACKEND_MODEL: ${BACKEND_MODEL:-gpt-5.4}
      BACKEND_TIMEOUT_SECONDS: ${BACKEND_TIMEOUT_SECONDS:-60}
      CHAT_HISTORY_LIMIT: ${CHAT_HISTORY_LIMIT:-12}
      APPROVAL_TTL_MINUTES: ${APPROVAL_TTL_MINUTES:-30}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-UTC}
      MORNING_BRIEF_TIME: ${MORNING_BRIEF_TIME:-08:00}
      HOUR_REMINDER_TIME: ${HOUR_REMINDER_TIME:-18:00}
      EVENING_WRAP_UP_TIME: ${EVENING_WRAP_UP_TIME:-20:00}
      REMINDER_SCAN_SECONDS: ${REMINDER_SCAN_SECONDS:-60}
      CALDAV_URL: ${CALDAV_URL:-}
      CALDAV_USERNAME: ${CALDAV_USERNAME:-}
      CALDAV_PASSWORD: ${CALDAV_PASSWORD:-}
      CALDAV_CALENDAR_NAME: ${CALDAV_CALENDAR_NAME:-}
      KBPLUS_BASE_URL: ${KBPLUS_BASE_URL:-}
      KBPLUS_API_TOKEN: ${KBPLUS_API_TOKEN:-}
      KBPLUS_BOARD_ID: ${KBPLUS_BOARD_ID:-}
      KBPLUS_TODO_COLUMN_ID: ${KBPLUS_TODO_COLUMN_ID:-}
      KBPLUS_DONE_COLUMN_ID: ${KBPLUS_DONE_COLUMN_ID:-}
      KBPLUS_TIMEOUT_SECONDS: ${KBPLUS_TIMEOUT_SECONDS:-10}
      STT_ENABLED: ${STT_ENABLED:-false}
      STT_MODEL: ${STT_MODEL:-base}
      STT_DEVICE: ${STT_DEVICE:-cpu}
      STT_COMPUTE_TYPE: ${STT_COMPUTE_TYPE:-int8}
      STT_LANGUAGE: ${STT_LANGUAGE:-}
      STT_VAD_FILTER: ${STT_VAD_FILTER:-true}
      STT_MAX_DURATION_SECONDS: ${STT_MAX_DURATION_SECONDS:-60}
      STT_MAX_FILE_SIZE_MB: ${STT_MAX_FILE_SIZE_MB:-10}
      STT_MODEL_DIR: ${STT_MODEL_DIR:-/models/whisper}
      STT_ECHO_TRANSCRIPT: ${STT_ECHO_TRANSCRIPT:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/data
      - ./data/whisper-models:/models/whisper
    depends_on:
      - cliproxyapi

  cliproxyapi:
    image: eceasy/cli-proxy-api:latest
    restart: unless-stopped
    mem_limit: ${CLIPROXYAPI_MEMORY_LIMIT:-512m}
    memswap_limit: ${CLIPROXYAPI_MEMORY_SWAP_LIMIT:-512m}
    ports:
      - "8317:8317"
      - "1455:1455"
    volumes:
      - ./deploy/cliproxyapi/config.yaml:/CLIProxyAPI/config.yaml
      - ./data/cliproxy-auth:/root/.cli-proxy-api
      - ./data/cliproxy-logs:/CLIProxyAPI/logs
